<h2 mat-dialog-title>Delete Task</h2>

<mat-dialog-content>
  Are you sure you want to delete task with ID {{ data.taskId }}?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-button color="warn" (click)="onConfirm()">Delete</button>
</mat-dialog-actions>
